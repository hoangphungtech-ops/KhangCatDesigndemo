services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: khangcat
      POSTGRES_USER: khangcat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khangcat -d khangcat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: server/.env
    environment:
      NODE_ENV: production
      DB_DRIVER: postgres
      DATABASE_URL: postgresql://khangcat:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/khangcat
      DB_SSL: "false"
      QUEUE_DRIVER: redis
      REDIS_URL: redis://redis:6379
      TRUST_PROXY: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: ["node", "src/worker.js"]
    env_file: server/.env
    environment:
      NODE_ENV: production
      DB_DRIVER: postgres
      DATABASE_URL: postgresql://khangcat:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/khangcat
      DB_SSL: "false"
      QUEUE_DRIVER: redis
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
